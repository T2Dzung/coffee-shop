name: CI — Code Quality Gate

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  GOMODCACHE: /home/runner/go/pkg/mod

jobs:
  # 1. Code Quality Check & Static Application Security Testing (SAST)
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          version: v2.12.2
          args: --timeout=5m

  # 2. Path Filtering for Monorepo Optimization — generates a dynamic build matrix
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            shared:
              - 'go.mod'
              - 'go.sum'
              - 'pkg/**'
              - 'internal/pkg/**'
              - 'db/**'
              - 'proto/**'
              - 'tools/**'
              - 'third_party/**'
              - 'sqlc.yaml'
              - 'buf.gen.yaml'
              - 'buf.work.yaml'
              - 'Makefile'
              - '.golangci.yml'
              - '.github/workflows/**'
            counter:
              - 'cmd/counter/**'
              - 'internal/counter/**'
              - 'docker/Dockerfile-counter'
            barista:
              - 'cmd/barista/**'
              - 'internal/barista/**'
              - 'docker/Dockerfile-barista'
            kitchen:
              - 'cmd/kitchen/**'
              - 'internal/kitchen/**'
              - 'docker/Dockerfile-kitchen'
            product:
              - 'cmd/product/**'
              - 'internal/product/**'
              - 'docker/Dockerfile-product'
            proxy:
              - 'cmd/proxy/**'
              - 'internal/proxy/**'
              - 'docker/Dockerfile-proxy'
            web:
              - 'cmd/web/**'
              - 'internal/web/**'
              - 'docker/Dockerfile-web'

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          SHARED="${{ steps.filter.outputs.shared }}"

          if [ "$SHARED" = "true" ]; then
            SERVICES_JSON='["counter","barista","kitchen","product","proxy","web"]'
          else
            RAW_CHANGES='${{ steps.filter.outputs.changes }}'
            if [ -z "$RAW_CHANGES" ] || [ "$RAW_CHANGES" = "null" ] || [ "$RAW_CHANGES" = "[]" ]; then
              SERVICES_JSON='[]'
            else
              SERVICES_JSON=$(printf '%s' "$RAW_CHANGES" | jq -c 'map(select(. != "shared"))')
            fi
          fi

          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"

  # 3. Build & Scan (validation only — no push to registry)
  build-and-scan:
    name: Build & Scan
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build Go Binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ./bin
          go build -v -tags migrate -ldflags="-w -s" -o ./bin/${{ matrix.service }} ./cmd/${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image (Local Only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile-${{ matrix.service }}
          push: false
          tags: go-coffeeshop-${{ matrix.service }}:${{ github.sha }}
          load: true

      - name: Trivy Container Image Scan (DevSecOps Gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: go-coffeeshop-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

  # 4. Unified Status Check for Branch Protection
  ci-status:
    name: CI Status
    needs: [lint, build-and-scan]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Verify CI Results
        id: status_check
        run: |
          LINT="${{ needs.lint.result }}"
          BUILD="${{ needs.build-and-scan.result }}"
          echo "Lint result: $LINT | Build-Scan result: $BUILD"

          if [ "$LINT" = "failure" ] || [ "$LINT" = "cancelled" ] || [ "$BUILD" = "failure" ] || [ "$BUILD" = "cancelled" ]; then
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce Pipeline Result
        run: |
          exit ${{ steps.status_check.outputs.exit_code }}
