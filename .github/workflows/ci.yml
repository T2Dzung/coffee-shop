name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Code Quality Check & Static Application Security Testing (SAST)
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --issues-exit-code=0 --timeout=5m

  # 2. Path Filtering for Monorepo Optimization — generates a dynamic build matrix
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            shared:
              - 'go.mod'
              - 'go.sum'
              - 'pkg/**'
              - 'internal/pkg/**'
              - '.github/workflows/ci.yml'
            counter:
              - 'cmd/counter/**'
              - 'internal/counter/**'
              - 'docker/Dockerfile-counter'
            barista:
              - 'cmd/barista/**'
              - 'internal/barista/**'
              - 'docker/Dockerfile-barista'
            kitchen:
              - 'cmd/kitchen/**'
              - 'internal/kitchen/**'
              - 'docker/Dockerfile-kitchen'
            product:
              - 'cmd/product/**'
              - 'internal/product/**'
              - 'docker/Dockerfile-product'
            proxy:
              - 'cmd/proxy/**'
              - 'internal/proxy/**'
              - 'docker/Dockerfile-proxy'
            web:
              - 'cmd/web/**'
              - 'internal/web/**'
              - 'docker/Dockerfile-web'

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          SHARED="${{ steps.filter.outputs.shared }}"

          if [ "$SHARED" = "true" ]; then
            SERVICES_JSON='["counter","barista","kitchen","product","proxy","web"]'
          else
            RAW_CHANGES='${{ steps.filter.outputs.changes }}'
            if [ -z "$RAW_CHANGES" ] || [ "$RAW_CHANGES" = "null" ] || [ "$RAW_CHANGES" = "[]" ]; then
              SERVICES_JSON='[]'
            else
              SERVICES_JSON=$(printf '%s' "$RAW_CHANGES" | jq -c 'map(select(. != "shared"))')
            fi
          fi

          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"

  # 3. Compile, Build Docker Image & Container Vulnerability Scanning
  build-and-scan:
    name: Build & Scan
    needs: [lint, detect-changes]
    runs-on: ubuntu-latest
    if: |
      needs.lint.result == 'success' &&
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify Go Compilation
        run: go build -v ./cmd/${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image Locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile-${{ matrix.service }}
          push: false
          tags: go-coffeeshop-${{ matrix.service }}:${{ github.sha }}
          load: true

      - name: Trivy Container Image Scan (DevSecOps Gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: go-coffeeshop-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
