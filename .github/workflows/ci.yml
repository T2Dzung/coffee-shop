name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Code Quality Check & Static Application Security Testing (SAST)
  lint:
    name: Lint & Code Quality
    runs-on: coffeeshop-runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        with:
          version: v2.12.2
          args: --timeout=5m

  # 2. Path Filtering for Monorepo Optimization — generates a dynamic build matrix
  detect-changes:
    name: Detect Changes
    runs-on: coffeeshop-runner
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            shared:
              - 'go.mod'
              - 'go.sum'
              - 'pkg/**'
              - 'internal/pkg/**'
              - 'db/**'
              - 'proto/**'
              - 'tools/**'
              - 'third_party/**'
              - 'sqlc.yaml'
              - 'buf.gen.yaml'
              - 'buf.work.yaml'
              - 'Makefile'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            counter:
              - 'cmd/counter/**'
              - 'internal/counter/**'
              - 'docker/Dockerfile-counter'
            barista:
              - 'cmd/barista/**'
              - 'internal/barista/**'
              - 'docker/Dockerfile-barista'
            kitchen:
              - 'cmd/kitchen/**'
              - 'internal/kitchen/**'
              - 'docker/Dockerfile-kitchen'
            product:
              - 'cmd/product/**'
              - 'internal/product/**'
              - 'docker/Dockerfile-product'
            proxy:
              - 'cmd/proxy/**'
              - 'internal/proxy/**'
              - 'docker/Dockerfile-proxy'
            web:
              - 'cmd/web/**'
              - 'internal/web/**'
              - 'docker/Dockerfile-web'

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          SHARED="${{ steps.filter.outputs.shared }}"

          if [ "$SHARED" = "true" ]; then
            SERVICES_JSON='["counter","barista","kitchen","product","proxy","web"]'
          else
            RAW_CHANGES='${{ steps.filter.outputs.changes }}'
            if [ -z "$RAW_CHANGES" ] || [ "$RAW_CHANGES" = "null" ] || [ "$RAW_CHANGES" = "[]" ]; then
              SERVICES_JSON='[]'
            else
              SERVICES_JSON=$(printf '%s' "$RAW_CHANGES" | jq -c 'map(select(. != "shared"))')
            fi
          fi

          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"

  # 3. Compile, Build Docker Image & Container Vulnerability Scanning
  build-and-scan:
    name: Build & Scan
    needs: [lint, detect-changes]
    runs-on: coffeeshop-runner
    if: |
      needs.lint.result == 'success' &&
      needs.detect-changes.outputs.services != '[]' &&
      needs.detect-changes.outputs.services != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify Go Compilation
        run: go build -v ./cmd/${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image Locally
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile-${{ matrix.service }}
          push: false
          tags: go-coffeeshop-${{ matrix.service }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Container Image Scan (DevSecOps Gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: go-coffeeshop-${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Docker System Garbage Collection
        if: always()
        run: |
          echo "=== TIẾN HÀNH DỌN DẸP DUNG LƯỢNG ĐĨA CỨNG CỤC BỘ ==="
          docker system prune -f --volumes
          df -h

  # 4. Unified Status Check & ChatOps Notification for Branch Protection
  build-and-scan-status:
    name: Build & Scan
    needs: build-and-scan
    runs-on: coffeeshop-runner
    if: always() && !cancelled()
    steps:
      - name: Verify Matrix Status & Set Notification Details
        id: status_check
        run: |
          RESULT="${{ needs.build-and-scan.result }}"
          echo "Build & Scan matrix result: $RESULT"
          
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            echo "status_emoji=✅" >> "$GITHUB_OUTPUT"
            echo "status_text=THÀNH CÔNG" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          else
            echo "status_emoji=❌" >> "$GITHUB_OUTPUT"
            echo "status_text=THẤT BẠI" >> "$GITHUB_OUTPUT"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Branch & Commit Info
        id: info
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
            echo "change_desc=PR #${{ github.event.pull_request.number }}: $PR_TITLE" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            # Extract only the first line of the commit message to prevent multiline output errors and keep notifications clean
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
            echo "change_desc=$FIRST_LINE" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram Notification
        env:
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        if: ${{ env.TELEGRAM_TO != '' && env.TELEGRAM_TOKEN != '' }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ${{ steps.status_check.outputs.status_emoji }} *DỰ ÁN COFFEE-SHOP: CI PIPELINE ${{ steps.status_check.outputs.status_text }}*
            
            *👤 Người thực hiện:* ${{ github.actor }}
            *🌿 Nhánh:* `${{ steps.info.outputs.branch }}`
            *📝 Thay đổi:* `${{ steps.info.outputs.change_desc }}`
            
            🔗 *Chi tiết Workflow:* [Xem log chi tiết trên GitHub](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Enforce Pipeline Result
        run: |
          exit ${{ steps.status_check.outputs.exit_code }}
