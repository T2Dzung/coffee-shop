apiVersion: apps/v1
kind: Deployment
metadata:
  name: barista
  namespace: coffeeshop
  labels:
    app: barista
spec:
  replicas: 1
  selector:
    matchLabels:
      app: barista
  template:
    metadata:
      labels:
        app: barista
    spec:
      containers:
        - name: barista
          image: 423623841278.dkr.ecr.ap-southeast-1.amazonaws.com/go-coffeeshop-barista:19d08f70d1df94c0e87e932ecb7c4845087e93c9
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: APP_NAME_BARISTA
            - name: IN_DOCKER
              valueFrom:
                configMapKeyRef:
                  name: coffeeshop-config
                  key: IN_DOCKER
            - name: PG_URL
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secret
                  key: PG_URL
            - name: PG_DSN_URL
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secret
                  key: PG_DSN_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: coffeeshop-secret
                  key: RABBITMQ_URL
