# ==============================================================================
# GitHub Actions Runner Scale Set Configuration (Dev Environment)
# ==============================================================================
# This configuration deploys Ephemeral Pod Runners using ARC (Actions Runner Controller).

githubConfigUrl: "https://github.com/T2Dzung/coffee-shop"
githubConfigSecret: "github-actions-token-secret" # Kubernetes Secret containing the GitHub PAT

minRunners: 2
maxRunners: 6

template:
  spec:
    securityContext:
      fsGroup: 1000 # Ensures correct file permissions for the non-root runner user (uid 1000)

    initContainers:
      - name: dind
        image: docker:24.0.7-dind
        imagePullPolicy: IfNotPresent
        restartPolicy: Always
        env:
          - name: DOCKER_TLS_CERTDIR
            value: "" # Disables TLS to allow unsecured TCP connection on port 2375 within the pod network namespace
        securityContext:
          privileged: true # Privileged mode is required for docker daemon execution inside container namespaces
        resources:
          limits:
            cpu: "2"
            memory: "3Gi"
          requests:
            cpu: "400m"
            memory: "1Gi"
        volumeMounts:
          - name: docker-storage
            mountPath: /var/lib/docker
    
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:2.317.0
        imagePullPolicy: IfNotPresent
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: "tcp://localhost:2375" # Points docker commands to the Native DinD Sidecar daemon
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        volumeMounts:
          - name: go-cache
            mountPath: /go/pkg/mod
    
    volumes:
      - name: go-cache
        persistentVolumeClaim:
          claimName: go-modules-cache-pvc
      - name: docker-storage
        emptyDir: {}
